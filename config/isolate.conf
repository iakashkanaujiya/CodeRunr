# Isolate configuration file
# See: https://github.com/ioi/isolate

# Range of UIDs/GIDs available for sandboxed processes.
# Each --box-id gets its own UID = FIRST_UID + box_id.
# Make sure these don't collide with real system users.
first_uid=60000
first_gid=60000
num_boxes=1000000

# cgroup v2 root (default for modern systems)
cg_root=/sys/fs/cgroup

# Directory for box filesystems
box_root=/var/local/lib/isolate

# Directory where lock files are created.
lock_root=/run/isolate/locks

# If you need to restrict which users can run isolate,
# uncomment and set:
# restricted_init=0
